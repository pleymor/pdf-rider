<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Reader</title>
  <link rel="stylesheet" href="/src/styles/app.css" />
</head>
<body>
  <div id="app">
    <div id="toolbar-container"></div>
    <div id="viewer-scroll">
      <div id="viewer-container">
        <canvas id="pdf-canvas"></canvas>
        <div id="text-layer"></div>
        <div id="link-layer"></div>
        <canvas id="annotation-canvas"></canvas>
      </div>
    </div>
  </div>
  <!-- Signature modal (hidden by default) -->
  <div id="signature-modal" class="modal-backdrop hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span>Signature</span>
        <button id="sig-close-btn" class="icon-btn" title="Cancel">✕</button>
      </div>
      <canvas id="signature-canvas" width="480" height="200"></canvas>
      <div class="modal-footer">
        <button id="sig-image-btn" class="btn">Insert Image…</button>
        <button id="sig-clear-btn" class="btn">Clear</button>
        <button id="sig-place-btn" class="btn btn-primary">Place</button>
      </div>
    </div>
  </div>
  <!-- Context menu -->
  <div id="ctx-menu" class="ctx-menu hidden">
    <button id="ctx-copy">Copier</button>
  </div>
  <!-- Toast notification -->
  <div id="toast" class="toast hidden"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
