<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Reader</title>
  <link rel="stylesheet" href="/src/styles/app.css" />
</head>
<body>
  <div id="app">
    <div id="toolbar-container"></div>
    <div id="viewer-scroll"></div>
  </div>
  <!-- Signature modal (hidden by default) -->
  <div id="signature-modal" class="modal-backdrop hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span data-i18n="sigTitle">Signature</span>
        <button id="sig-close-btn" class="icon-btn" title="Cancel" data-i18n-title="sigCancel">✕</button>
      </div>
      <canvas id="signature-canvas" width="480" height="200"></canvas>
      <div class="modal-footer">
        <button id="sig-image-btn" class="btn" data-i18n="sigInsertImage">Insert Image…</button>
        <button id="sig-clear-btn" class="btn" data-i18n="sigClear">Clear</button>
        <button id="sig-place-btn" class="btn btn-primary" data-i18n="sigPlace">Place</button>
      </div>
    </div>
  </div>
  <!-- Compress modal -->
  <div id="compress-modal" class="modal-backdrop hidden">
    <div class="modal-box compress-box">
      <div class="modal-header">
        <span id="compress-title-span" data-i18n="compressTitle">Compress PDF</span>
        <button id="compress-close-btn" class="icon-btn" title="Cancel" data-i18n-title="compressClose">✕</button>
      </div>
      <div class="compress-options">
        <label class="compress-option">
          <input type="radio" name="compress-level" value="screen" />
          <div class="compress-option-body">
            <span id="compress-screen-label" class="compress-option-name" data-i18n="compressScreen">Screen</span>
            <span class="compress-option-desc" data-i18n="compressScreenDesc">Smallest file, lower quality</span>
          </div>
        </label>
        <label class="compress-option">
          <input type="radio" name="compress-level" value="ebook" checked />
          <div class="compress-option-body">
            <span id="compress-ebook-label" class="compress-option-name" data-i18n="compressEbook">Ebook</span>
            <span class="compress-option-desc" data-i18n="compressEbookDesc">Balanced size and quality</span>
          </div>
        </label>
        <label class="compress-option">
          <input type="radio" name="compress-level" value="print" />
          <div class="compress-option-body">
            <span id="compress-print-label" class="compress-option-name" data-i18n="compressPrint">Print</span>
            <span class="compress-option-desc" data-i18n="compressPrintDesc">Good quality, moderate reduction</span>
          </div>
        </label>
      </div>
      <div class="modal-footer">
        <button id="compress-apply-btn" class="btn btn-primary" data-i18n="compressApply">Compress &amp; Save As…</button>
      </div>
    </div>
  </div>
  <!-- Context menu -->
  <div id="ctx-menu" class="ctx-menu hidden">
    <button id="ctx-copy" data-i18n="ctxCopy">Copy</button>
  </div>
  <!-- Settings modal -->
  <div id="settings-modal" class="modal-backdrop hidden">
    <div class="modal-box settings-box">
      <div class="modal-header">
        <span data-i18n="settingsTitle">Settings</span>
        <button id="settings-close-btn" class="icon-btn" title="Close" data-i18n-title="settingsClose">✕</button>
      </div>
      <div class="settings-section">
        <h3 class="settings-section-title" data-i18n="settingsInterface">Interface</h3>
        <div class="settings-row">
          <label for="settings-lang" class="settings-label" data-i18n="settingsLanguage">Language</label>
          <select id="settings-lang" class="settings-select"></select>
        </div>
      </div>
      <div class="settings-section" id="settings-default-app-section">
        <h3 class="settings-section-title" data-i18n="settingsDefaultApp">Default App</h3>
        <div class="settings-row">
          <button id="settings-default-btn" class="settings-btn" data-i18n="settingsSetDefault">Set as default PDF viewer</button>
        </div>
      </div>
    </div>
  </div>
  <!-- Toast notification -->
  <div id="toast" class="toast hidden"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
