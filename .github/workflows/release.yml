name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Update version in tauri.conf.json
        shell: pwsh
        run: |
          (Get-Content src-tauri/tauri.conf.json) `
            -replace '"version": "[^"]*"', '"version": "${{ steps.version.outputs.version }}"' |
            Set-Content src-tauri/tauri.conf.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Build MSIX package
        shell: pwsh
        run: |
          .\build-msix.ps1 -SkipBuild -Version "${{ steps.version.outputs.version }}"

      - name: Stage artifacts
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cp "src-tauri/target/release/pdf-rider-portable.exe" \
             "pdf-rider-portable-${VERSION}-win-x64.exe"
          cp "src-tauri/target/release/bundle/nsis/PDF Rider_${VERSION}_x64-setup.exe" \
             "pdf-rider-${VERSION}-win-x64-setup.exe"
          cp "msix-output/PDFRider_${VERSION}.0_x64.msix" \
             "pdf-rider-${VERSION}-win-x64.msix"

      - name: Check pre-release
        id: prerelease
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$VERSION" == *"-alpha"* ]] || [[ "$VERSION" == *"-beta"* ]] || [[ "$VERSION" == *"-rc"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          files: |
            pdf-rider-portable-${{ steps.version.outputs.version }}-win-x64.exe
            pdf-rider-${{ steps.version.outputs.version }}-win-x64-setup.exe
            pdf-rider-${{ steps.version.outputs.version }}-win-x64.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
